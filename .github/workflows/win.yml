name: Build Windows (Official Style)

on:
  workflow_dispatch:  # 手动运行

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # 关键：去掉 --onefile，就是官方的多文件模式
      - name: Build (Official folder mode)
        run: |
          pyinstaller PySN.py -w --icon="AphIcon.ico"

      - name: Zip folder
        run: |
          Compress-Archive -Path "dist\PySN\*" -DestinationPath PySN_Windows.zip

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: PySN_Windows
          path: PySN_Windows.zip